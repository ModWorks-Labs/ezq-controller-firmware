
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ezq-yellow: #E8D44D;
    --ezq-blue: #5BC4E8;
    --ezq-blue-bg: #1a3a45;
    --ezq-blue-border: rgba(91,196,232,0.25);
    --ezq-bg: #161618;
    --ezq-surface: #1f1f22;
    --ezq-card: #252528;
    --ezq-inner: #2c2c30;
    --ezq-border: rgba(255,255,255,0.07);
    --ezq-text: #f0f0f0;
    --ezq-muted: #888890;
    --ezq-dim: #4a4a52;
  }

  .shell {
    background: var(--ezq-bg);
    border-radius: 12px;
    overflow: hidden;
    width: 360px;
    margin: 0 auto;
    border: 0.5px solid rgba(255,255,255,0.08);
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--ezq-text);
  }

  .topbar {
    background: var(--ezq-surface);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 48px;
    border-bottom: 0.5px solid var(--ezq-border);
  }
  .logo { font-size: 20px; font-weight: 700; color: var(--ezq-yellow); letter-spacing: 1px; }
  .ap-badge {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--ezq-border);
    border-radius: 20px; padding: 3px 10px;
    font-size: 10px; color: var(--ezq-muted); letter-spacing: 0.5px;
  }
  .ap-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf7d; flex-shrink: 0; }

  .nav { background: var(--ezq-surface); display: flex; border-bottom: 0.5px solid var(--ezq-border); }
  .nav-tab {
    flex: 1; text-align: center; font-size: 12px; padding: 9px 4px;
    color: var(--ezq-muted); border-bottom: 2px solid transparent; letter-spacing: 0.3px;
  }
  .nav-tab.active { color: var(--ezq-yellow); border-bottom-color: var(--ezq-yellow); }

  .stack { display: flex; flex-direction: column; gap: 12px; padding: 14px; }

  .card {
    background: var(--ezq-card);
    border: 0.5px solid var(--ezq-border);
    border-radius: 10px; padding: 16px;
  }
  .card-label {
    font-size: 9px; letter-spacing: 1.2px;
    color: var(--ezq-muted); text-transform: uppercase; margin-bottom: 12px;
  }

  .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .ctrl-btn {
    border-radius: 8px; padding: 12px 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
    border: 0.5px solid rgba(255,255,255,0.07);
    background: var(--ezq-inner);
    transition: background 0.2s, border-color 0.2s;
  }
  .ctrl-btn i { font-size: 18px; color: var(--ezq-muted); transition: color 0.2s; }
  .ctrl-btn-label { font-size: 12px; font-weight: 500; color: var(--ezq-text); line-height: 1.2; transition: color 0.2s; }
  .ctrl-btn-sub { font-size: 10px; color: var(--ezq-muted); transition: color 0.2s; }

  .ctrl-btn.ignition {
    background: var(--ezq-yellow);
    border-color: transparent;
  }
  .ctrl-btn.ignition i { color: #111; }
  .ctrl-btn.ignition .ctrl-btn-label { color: #111; }
  .ctrl-btn.ignition .ctrl-btn-sub { color: rgba(0,0,0,0.5); }

  .ctrl-btn.blower.on {
    background: var(--ezq-blue-bg);
    border-color: var(--ezq-blue-border);
  }
  .ctrl-btn.blower.on i { color: var(--ezq-blue); }
  .ctrl-btn.blower.on .ctrl-btn-label { color: var(--ezq-blue); }
  .ctrl-btn.blower.on .ctrl-btn-sub { color: rgba(91,196,232,0.6); }

  .telem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .telem-cell {
    background: var(--ezq-inner);
    border: 0.5px solid rgba(255,255,255,0.05);
    border-radius: 7px; padding: 10px 12px;
  }
  .telem-cell.full { grid-column: 1 / -1; }
  .telem-lbl { font-size: 9px; letter-spacing: 0.8px; color: var(--ezq-muted); text-transform: uppercase; margin-bottom: 3px; }
  .telem-val { font-size: 24px; font-weight: 500; color: var(--ezq-text); line-height: 1.1; }
  .telem-val span { font-size: 12px; color: var(--ezq-muted); font-weight: 400; margin-left: 1px; }
  .telem-val.state-val { font-family: var(--font-mono, monospace); letter-spacing: 0.5px; }

  .device-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 0.5px solid var(--ezq-border);
  }
  .device-row:last-child { border-bottom: none; }
  .device-key { font-size: 10px; color: var(--ezq-muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .device-val { font-size: 15px; color: var(--ezq-text); font-family: var(--font-mono, monospace); }
</style>

<div class="shell">
  <div class="topbar">
    <div class="logo">EZQ</div>
    <div class="ap-badge"><div class="ap-dot"></div>AP ACTIVE</div>
  </div>

  <div class="nav">
    <div class="nav-tab active">Dashboard</div>
    <div class="nav-tab">Settings</div>
    <div class="nav-tab">Cycles</div>
  </div>

  <div class="stack">

    <div class="card">
      <div class="card-label">Control Panel</div>
      <div class="control-grid">
        <div class="ctrl-btn ignition">
          <i class="ti ti-flame" aria-hidden="true"></i>
          <div class="ctrl-btn-label">Ignition Cycle</div>
          <div class="ctrl-btn-sub">Start</div>
        </div>
        <div class="ctrl-btn blower" id="blowerBtn" onclick="toggleBlower()">
          <i class="ti ti-wind" aria-hidden="true"></i>
          <div class="ctrl-btn-label">Blower Mode</div>
          <div class="ctrl-btn-sub" id="blowerSub">Off</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Live Telemetry</div>
      <div class="telem-grid">
        <div class="telem-cell">
          <div class="telem-lbl">Temperature</div>
          <div class="telem-val">23.6<span>°C</span></div>
        </div>
        <div class="telem-cell">
          <div class="telem-lbl">Battery</div>
          <div class="telem-val">11.4<span>V</span></div>
        </div>
        <div class="telem-cell full">
          <div class="telem-lbl">State</div>
          <div class="telem-val state-val">READY_IDLE</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Device</div>
      <div class="device-row">
        <span class="device-key">Board ID</span>
        <span class="device-val">EZQ-CTLR-B</span>
      </div>
      <div class="device-row">
        <span class="device-key">Serial</span>
        <span class="device-val">0006</span>
      </div>
      <div class="device-row">
        <span class="device-key">Firmware</span>
        <span class="device-val">v1.3.0-beta</span>
      </div>
    </div>

  </div>
</div>

<script>
  function toggleBlower() {
    const btn = document.getElementById('blowerBtn');
    const sub = document.getElementById('blowerSub');
    const on = btn.classList.toggle('on');
    sub.textContent = on ? 'On' : 'Off';
  }
</script>
